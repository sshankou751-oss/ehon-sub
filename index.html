<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アップルちゃんのゆめのもりのものがたり</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            line-height: 2.2;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #e5e1cc;
            color: #333;
            text-align: center;
        }
        .header-image {
            width: 100%;
            max-width: 1000px;
            height: auto;
            display: block;
            margin: 0 auto 40px;
        }
        h1 {
            font-size: 32px;
            color: #6b8e23;
            margin: 20px 0;
            padding: 0 20px;
        }
        p {
            font-size: 18px;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <img
        src="apple-hero.png"
        alt="アップルちゃんの森のイラスト"
        class="header-image"
    />


    <!-- メインコンテンツ -->
    <div style="max-width:600px; margin:40px auto 60px; padding:0 24px; display:flex; align-items:flex-end; gap:16px;">
        <img src="apple-chan.png" alt="アップルちゃん" style="width:130px; height:auto; flex-shrink:0; align-self:flex-end;" />
        <div style="position:relative; background:white; border-radius:24px 24px 24px 4px; border:3px solid #c8e6a0; padding:24px 22px; box-shadow:0 6px 24px rgba(109,170,122,0.15); text-align:left;">
            <!-- 吹き出しの三角 -->
            <div style="position:absolute; left:-16px; bottom:24px; width:0; height:0; border-top:10px solid transparent; border-bottom:10px solid transparent; border-right:16px solid #c8e6a0;"></div>
            <div style="position:absolute; left:-11px; bottom:25px; width:0; height:0; border-top:9px solid transparent; border-bottom:9px solid transparent; border-right:14px solid white;"></div>
            <p style="font-size:16px; color:#3d5c46; line-height:2.2; margin:0; font-family:'Hiragino Maru Gothic Pro',sans-serif;">
                ここは、わたし アップルちゃんの とくべつなページだよ！🍏<br><br>
                わたしのことや もりのなかまたちを これからすこしずつ しょうかいしていくね 🌿<br><br>
                <span style="font-weight:800; color:#6daa7a;">たのしみに まっていてね！✨</span>
            </p>
        </div>
    </div>

    <footer style="text-align:center; padding:40px 24px; background:rgba(255,255,255,0.5); border-top:2px solid #e4f0e4; margin-top:60px;">
        <p style="color:#8aab94; font-size:13px; margin:0 0 8px;">絵本のもりには、他にもたくさんの物語があるよ ✨</p>
        <a href="https://www.ehonnomori-studio.com" target="_blank" rel="noopener noreferrer" style="display:inline-block; margin:0 auto 24px; padding:8px 20px; background:linear-gradient(135deg,#a8d5a2,#6daa7a); color:white; border-radius:20px; font-size:13px; font-weight:700; text-decoration:none; box-shadow:0 2px 8px rgba(109,170,122,0.3);">
            🌳 絵本のもりへ
        </a>
        <img src="og-logo.png" alt="絵本のもり" style="height:52px; width:auto; margin:0 auto 10px; display:block; opacity:0.45;" />
        <p style="color:#aac8aa; font-size:12px; margin:0;">© 絵本のもり</p>
    </footer>

</body>
</html>
